services:
  - type: web
    plan: free
    runtime: image
    name: n8n-service
    image:
      url: docker.io/n8nio/n8n:latest
    envVars:
      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      # ── Database (Supabase permanent) ──────────────────
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: aws-1-ap-northeast-1.pooler.supabase.com
      - key: DB_POSTGRESDB_PORT
        value: 5432
      - key: DB_POSTGRESDB_DATABASE
        value: postgres
      - key: DB_POSTGRESDB_USER
        value: postgres.znwopypvlncsmrslifoh
      - key: DB_POSTGRESDB_PASSWORD
        value: Supabase200
      - key: DB_POSTGRESDB_SSL_ENABLED
        value: true
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: false

      # ── Port config ────────────────────────────────────
      - key: PORT
        value: 5678
      - key: N8N_PORT
        value: 5678
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PROTOCOL
        value: https

      # ── Timezone (IST for 8 AM cron) ──────────────────
      - key: GENERIC_TIMEZONE
        value: Asia/Kolkata
      - key: TZ
        value: Asia/Kolkata

      # ── Performance & stability ────────────────────────
      - key: EXECUTIONS_MODE
        value: regular
      - key: N8N_RUNNERS_ENABLED
        value: false

      # ── Security ───────────────────────────────────────
      - key: N8N_SECURE_COOKIE
        value: false

      # ── Webhook URL (update after first deploy) ────────
      - key: WEBHOOK_URL
        value: https://n8n-service.onrender.com

      # ── Job search profile ─────────────────────────────
      - key: JOB_EXPECTED_SALARY
        value: 10-15 LPA
      - key: JOB_EXPERIENCE_YEARS
        value: 2.6
      - key: JOB_TARGET_ROLES
        value: GenAI Engineer,AI Engineer,Python Backend Developer,LLM Engineer,AI Full Stack Developer
      - key: JOB_SKILLS
        value: Python,FastAPI,React,Docker,RAG,LLM,ElasticSearch,GenAI

# No databases section — using Supabase instead (permanent + free forever)
